name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend (Build & Tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm test

  backend:
    name: Backend (Laravel Tests)
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: progest_test
      DB_USERNAME: progest
      DB_PASSWORD: secret
      APP_ENV: testing

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: progest_test
          MYSQL_USER: progest
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: rootsecret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql, gd, zip, bcmath, exif, pcntl, opcache
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Setup environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Allow MySQL triggers
        run: mysql -h 127.0.0.1 -P 3306 -u root -prootsecret -e "SET GLOBAL log_bin_trust_function_creators = 1;"

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run tests
        working-directory: backend
        run: php artisan test
